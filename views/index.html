<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ITD Clothing</title>
  <meta name="description" content="Shop ITD Clothing for premium hoodies, tees and tracksuits. High quality streetwear built for everyday wear.">

<meta name="keywords" content="ITD Clothing, streetwear, hoodies, tracksuits, UK clothing brand">

<meta name="robots" content="index, follow">

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script defer src="/js/main.js"></script>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container header__inner">
      <a class="brand" href="/">
        <img src="/images/itd-logo.png" alt="ITD Clothing logo" class="brand__logo" />
      </a>

      <nav class="nav" id="nav">
        <a href="/shop" class="nav__link">Shop</a>
      </nav>

      <div class="header__actions">
  <a href="https://www.instagram.com/inthedistanceitd/" 
     target="_blank" 
     rel="noopener noreferrer" 
     class="icon-btn" 
     aria-label="Instagram">
    <i class="fa-brands fa-instagram"></i>
  </a>

  <a href="/cart" class="icon-btn" aria-label="Cart">
    <i class="fa-solid fa-bag-shopping"></i>
  </a>
</div>
</div>

        <button class="burger" id="burger" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero__media">
      <img src="/images/itd-hero1.jpg" alt="Hero banner" />
    </div>

    <div class="container hero__content">
      <h1 class="hero__title">In The Distance.</h1>
      <p class="hero__subtitle">Minimal streetwear built for everyday performance.</p>
      <div class="hero__cta">
        <a class="btn btn--primary" href="/shop">Shop New</a>
        <a class="btn btn--ghost" href="/shop">Explore</a>
      </div>
    </div>
  </section>

  <!-- Featured -->
<section class="section">
  <div class="container">
    <div class="section__head">
      <h2>Featured</h2>
      <a href="/shop" class="link">View all</a>
    </div>

    <div class="grid-3 featured-grid">
      <!-- New Arrivals -->
      <a class="card feature-card" href="/shop">
        <div class="feature-card__media">
          <img id="newArrivalsImage" src="\images\ITDOliveGreenHoodieFModel.png" alt="New Arrivals">
        </div>
        <div class="card__label">New Arrivals</div>
      </a>

      <!-- Essentials -->
      <a class="card feature-card" href="/shop">
        <div class="feature-card__media hover-swap">
          <img class="img-main" src="images/ITDBlackTeeFModel.png" alt="Essentials front">
          <img class="img-hover" src="images/ITDWhiteTeeFModel.png" alt="Essentials back">
        </div>
        <div class="card__label">Essentials</div>
      </a>

      <!-- Coming Soon -->
      <a class="card feature-card" href="#">
        <div class="feature-card__media">
          <img src="images\comingSoon.png" alt="Coming Soon">
        </div>
        <div class="card__label">Sale</div>
      </a>
    </div>
  </div>
</section>

  <!-- Promo strip -->
  <section class="promo">
    <div class="container promo__inner">
      <p><strong>Free delivery</strong> For orders over £80 • UK Only • £7.99</p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer__inner">
      <div>
        <img src="/images/itd-logo.png" alt="ITD Clothing logo" class="footer__logo"/>
        <p class="muted">Belfast Clothing Brand, built with quality.</p>
      </div>

      <div class="footer__cols">
        <div>
          <h4>Shop</h4>
          <a href="\shop.html">New</a>
        </div>
        <div>
          <h4>Help (Coming Soon!)</h4>
          <a href="#">Contact</a>
          <a href="#">Delivery</a>
          <a href="#">Returns</a>
        </div>
      </div>
    </div>
  </footer>

</body>
</html>
