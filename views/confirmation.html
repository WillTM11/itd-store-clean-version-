<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Confirmed • ITD Clothing</title>

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script defer src="/js/confirmation.js"></script>
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a class="brand" href="/">
        <img src="/images/itd-logo.png" alt="ITD Clothing logo" class="brand__logo" />
      </a>
      <nav class="nav">
        <a href="/shop" class="nav__link">Continue Shopping</a>
      </nav>
    </div>
  </header>

  <main class="container page">
    <div class="panel">
      <h1 class="page__title">Order confirmed</h1>
      <p class="page__sub">Thanks! Your order has been placed
      </p>

      <div class="divider"></div>

      <div id="confirmRoot" class="muted">Loading order…</div>

      <div style="margin-top:16px;">
        <a class="btn btn--primary" href="/shop">Back to Shop</a>
      </div>
    </div>
  </main>

</body>
</html>
